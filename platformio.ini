; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:kb2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_kb2040
framework = arduino
monitor_speed = 115200
upload_protocol = picotool

lib_deps =
  fortyseveneffects/MIDI Library
  adafruit/Adafruit GFX Library
  adafruit/Adafruit SSD1306
  adafruit/Adafruit SSD1331 OLED Driver Library for Arduino
  adafruit/Adafruit NeoPixel

build_flags =
  -D USB_MIDI_ENABLED=1
  ; -D DISPLAY_BACKEND_SSD1306=1
  ; Uncomment to test the color SPI OLED backend:
  ; -D DISPLAY_BACKEND_SSD1331=1
  ; Uncomment to mirror to both OLEDs at once (SSD1306 + SSD1331):
  -D DISPLAY_BACKEND_MIRROR=1

  ; SSD1331 brightness tuning (applies when SSD1331 backend is active)
  ; Master current: 0x00..0x0F (higher = brighter)
  -D OLED_SSD1331_MASTER_CURRENT=0x0F
  ; Per-channel contrast: 0x00..0xFF
  -D OLED_SSD1331_CONTRAST_A=0xFF
  -D OLED_SSD1331_CONTRAST_B=0xFF
  -D OLED_SSD1331_CONTRAST_C=0xFF

; Fallback upload (manual BOOTSEL):
; powershell -ExecutionPolicy Bypass -NoProfile -Command "$d=(Get-Volume | Where-Object FileSystemLabel -eq 'RPI-RP2' | Select-Object -First 1 -ExpandProperty DriveLetter); if(-not $d){ throw 'RPI-RP2 drive not found. Put board in BOOTSEL mode first.' }; Copy-Item '.pio/build/kb2040/firmware.uf2' \"$($d):\\\" -Force"